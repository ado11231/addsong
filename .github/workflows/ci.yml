name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install addsong + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Typecheck with mypy
        run: mypy src/addsong

      - name: Run pytest tests
        run: pytest -q