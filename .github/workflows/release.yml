name: Release (PyPI)

# Builds the wheel + sdist on a pushed v* tag and publishes to PyPI using
# OIDC trusted publishing (no stored API token). Configure the trusted
# publisher once on pypi.org first — see RELEASE.md.
on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing requires id-token: write.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Smoke-install the wheel and run --version
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          addsong --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1